<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Scanner | Trading Tools</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        .header {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tabs {
            display: flex;
            gap: 15px;
        }
        .tab {
            padding: 10px 20px;
            background-color: #222;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab.active {
            background-color: #00ffcc;
            color: #000;
        }
        .tab:hover:not(.active) {
            background-color: #333;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .exchange-selector {
            display: flex;
            background: #1a1a1a;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .ex-btn {
            padding: 8px 20px;
            background: transparent;
            color: #888;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .ex-btn.active {
            background: #00ffcc;
            color: #000;
        }
        
        .sound-btn {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .sound-btn.on {
            background-color: #00ffcc;
            color: #000;
            border-color: #00ffcc;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #1a1a1a;
            color: #888;
        }
        .status {
            font-size: 0.8em;
            color: #ff4444;
            font-weight: bold;
        }
        
        .row-level-1 { background-color: rgba(0, 255, 204, 0.1); color: #00ffcc; font-weight: bold; }
        .row-level-2 { background-color: rgba(255, 255, 0, 0.1); color: #ffff00; font-weight: bold; } 
        .row-level-3 { background-color: rgba(255, 165, 0, 0.1); color: #ffa500; font-weight: bold; } 
        .row-level-4 { background-color: rgba(255, 68, 68, 0.15); color: #ff4444; font-weight: bold; }
        
        .type-long { color: #00ffcc; font-weight: bold; }
        .type-short { color: #ff4444; font-weight: bold; }
        
        .search-container { text-align: center; padding: 40px 20px; }
        .search-input { padding: 12px; font-size: 18px; background: #222; color: #00ffcc; border: 1px solid #00ffcc; border-radius: 5px; text-transform: uppercase; width: 300px; outline: none; }
        .search-btn { padding: 12px 25px; font-size: 18px; background: #00ffcc; color: #000; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px; transition: 0.2s; }
        .search-btn:hover { background: #00ccaa; }
        .result-card { margin-top: 30px; background: #1a1a1a; padding: 25px; border: 1px solid #333; border-radius: 8px; display: inline-block; text-align: left; min-width: 400px; }

        .ai-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: -1px;
        }
        .ai-blue { background-color: #007bff; box-shadow: 0 0 8px #007bff; }
        .ai-yellow { background-color: #ffc107; box-shadow: 0 0 8px #ffc107; }
        .ai-red { background-color: #ff4444; box-shadow: 0 0 8px #ff4444; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 8px #ff4444; }
            50% { transform: scale(1.4); box-shadow: 0 0 15px #ff4444; }
            100% { transform: scale(1); box-shadow: 0 0 8px #ff4444; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="tabs">
            <div class="tab" id="tab-search">Общий поиск</div>
            <div class="tab active" id="tab-pingpong">Ping-Pong</div>
            <div class="tab" id="tab-densities">Плотности</div>
        </div>
        
        <div class="controls">
            <div class="exchange-selector">
                <button class="ex-btn active" id="ex-bingx" onclick="setExchange('bingx')">BINGX</button>
                <button class="ex-btn" id="ex-bitget" onclick="setExchange('bitget')">BITGET</button>
                <button class="ex-btn" id="ex-mexc" onclick="setExchange('mexc')">MEXC</button>
            </div>
            
            <button id="sound-toggle" class="sound-btn">🔕 Звук ВКЛ</button>
            <div class="status" id="api-status">STATUS: [CONNECTING...]</div>
        </div>
    </div>

    <h2 id="page-title">Активные ситуации "Ping-Pong"</h2>
    
    <table id="main-table">
        <thead id="table-head"></thead>
        <tbody id="data-table"></tbody>
    </table>

    <div id="search-section" class="search-container" style="display: none;">
        <input type="text" id="search-input" class="search-input" placeholder="Введите тикер (например: DOGE)" onkeydown="if(event.key === 'Enter') performSearch()">
        <button class="search-btn" onclick="performSearch()">Сканировать</button>
        <div id="search-result"></div>
    </div>

    <script>
        const BASE_URL = "https://ping-pong-backend-yhro.onrender.com/api";
        let currentMode = "pingpong"; 
        let currentExchange = "bingx"; 
        
        function setExchange(exchange) {
            currentExchange = exchange;
            // Умное снятие класса active со всех кнопок бирж
            document.querySelectorAll('.ex-btn').forEach(btn => btn.classList.remove('active'));
            // Установка active на нажатую
            document.getElementById('ex-' + exchange).classList.add('active');
            
            notifiedCoins = {}; 
            
            if (currentMode !== 'search') {
                document.getElementById('data-table').innerHTML = '<tr><td colspan="8">Загрузка данных биржи...</td></tr>';
                updateData(); 
            } else {
                document.getElementById('search-result').innerHTML = ''; 
            }
        }

        document.getElementById('tab-pingpong').addEventListener('click', (e) => switchTab('pingpong', e.target));
        document.getElementById('tab-densities').addEventListener('click', (e) => switchTab('densities', e.target));
        document.getElementById('tab-search').addEventListener('click', (e) => switchTab('search', e.target));
        
        function switchTab(mode, element) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            
            const table = document.getElementById('main-table');
            const searchSection = document.getElementById('search-section');
            const title = document.getElementById('page-title');
            
            if (mode === 'search') {
                table.style.display = 'none';
                searchSection.style.display = 'block';
                title.innerText = 'Быстрый рентген монеты';
                document.getElementById('search-result').innerHTML = '';
            } else {
                table.style.display = 'table';
                searchSection.style.display = 'none';
                document.getElementById('data-table').innerHTML = '<tr><td colspan="8">Загрузка данных...</td></tr>';
                updateData(); 
            }
        }

        let soundEnabled = true; 
        let audioCtx = null;
        let notifiedCoins = {};

        const soundBtn = document.getElementById('sound-toggle');
        soundBtn.classList.add('on');
        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                soundBtn.innerText = "🔔 Звук ВКЛ";
                soundBtn.classList.add('on');
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } else {
                soundBtn.innerText = "🔕 Звук ВЫКЛ";
                soundBtn.classList.remove('on');
            }
        });

        function playAlertSound(level) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            let frequency = 440; let type = 'sine'; let duration = 0.2; let volume = 0.1;
            if (level === 1) { frequency = 600; type = 'sine'; duration = 0.15; } 
            else if (level === 2) { frequency = 800; type = 'triangle'; duration = 0.25; volume = 0.15; } 
            else if (level === 3) { frequency = 1000; type = 'square'; duration = 0.35; volume = 0.2; } 
            else if (level === 4) { frequency = 1500; type = 'sawtooth'; duration = 0.5; volume = 0.3; }

            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        async function performSearch() {
            const input = document.getElementById('search-input').value.trim();
            if (!input) return;
            
            const resDiv = document.getElementById('search-result');
            resDiv.innerHTML = `<h3 style="color:yellow;">Связь с биржей ${currentExchange.toUpperCase()}... ⏳</h3>`;
            
            try {
                const response = await fetch(`${BASE_URL}/search?ticker=${input}&exchange=${currentExchange}`);
                const data = await response.json();
                
                if (data.error) {
                    resDiv.innerHTML = `<h3 style="color:#ff4444;">${data.error}</h3>`;
                    return;
                }
                
                let bidHtml = data.nearest_bid 
                    ? `<span class="type-long">Покупка:</span> ${data.nearest_bid.price} (Объем: $${data.nearest_bid.vol.toLocaleString('ru-RU')})` 
                    : "Нет крупных стенок";
                    
                let askHtml = data.nearest_ask 
                    ? `<span class="type-short">Продажа:</span> ${data.nearest_ask.price} (Объем: $${data.nearest_ask.vol.toLocaleString('ru-RU')})` 
                    : "Нет крупных стенок";

                resDiv.innerHTML = `
                    <div class="result-card">
                        <h2 style="margin-top:0; color:#00ffcc; border-bottom: 1px solid #333; padding-bottom: 10px;">${data.ticker} <span style="font-size:14px; color:#888;">(${currentExchange.toUpperCase()})</span></h2>
                        <p style="font-size: 18px;"><b>Текущая цена:</b> ${data.price}</p>
                        <p style="font-size: 18px;"><b>Чистый спред:</b> <span style="color:#ffa500; font-weight:bold;">${data.spread}</span></p>
                        
                        <div style="background: #222; padding: 15px; border-radius: 5px; margin-top: 20px;">
                            <h4 style="margin-top:0; color:#888;">Ближайшие стенки (от $1000)</h4>
                            <p style="font-size: 16px; margin: 10px 0;">⬇️ ${bidHtml}</p>
                            <p style="font-size: 16px; margin: 10px 0;">⬆️ ${askHtml}</p>
                        </div>
                    </div>
                `;
            } catch(e) {
                resDiv.innerHTML = `<h3 style="color:#ff4444;">Ошибка запроса. Сервер недоступен.</h3>`;
            }
        }

        async function updateData() {
            if (currentMode === "search") return;

            try {
                if (soundEnabled && !audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                const timestamp = new Date().getTime();
                const targetEndpoint = currentMode === "pingpong" ? "/ping-pong" : "/densities";
                const response = await fetch(`${BASE_URL}${targetEndpoint}?exchange=${currentExchange}&t=${timestamp}`);
                
                if (!response.ok) throw new Error("Сервер не ответил");
                
                const data = await response.json();
                
                const title = document.getElementById('page-title');
                const tableHead = document.getElementById('table-head');
                const tableBody = document.getElementById('data-table');
                
                let htmlBuffer = ""; 
                
                if (currentMode === "pingpong") {
                    title.innerText = `Активные ситуации "Ping-Pong" (${currentExchange.toUpperCase()})`;
                    tableHead.innerHTML = `<tr><th>Тикер</th><th>Спред (%)</th><th>Покупка (Низ)</th><th>Продажа (Верх)</th><th>Сделок (1м/5м/15м)</th><th>Объем $ (1м/5м/15м)</th><th>Стенки ($)</th><th>Давление стакана</th></tr>`;
                    
                    let currentScanCoins = new Set();
                    let highestAlertLevel = 0;

                    data.forEach(row => {
                        let trClass = "";
                        let level = 0;
                        let aiDot = ""; 
                        let imbalanceHtml = "-"; 
                        
                        if (row.spread && row.spread !== "-") {
                            let spreadVal = parseFloat(row.spread);
                            
                            if (spreadVal > 15) { level = 4; trClass = "row-level-4"; }
                            else if (spreadVal > 10) { level = 3; trClass = "row-level-3"; }
                            else if (spreadVal > 5) { level = 2; trClass = "row-level-2"; }
                            else if (spreadVal > 3) { level = 1; trClass = "row-level-1"; }
                            
                            let hits1m = 0;
                            if (row.hits && row.hits !== "-" && row.hits !== "~") {
                                hits1m = parseInt(row.hits.split('/')[0].trim());
                            }

                            if (spreadVal >= 4.0 && hits1m >= 2) {
                                aiDot = `<span class="ai-dot ai-red" title="СРОЧНО: Большой спред (${spreadVal}%) и монета активна!"></span>`;
                            } 
                            else if (spreadVal >= 2.0 && hits1m >= 1) {
                                aiDot = `<span class="ai-dot ai-yellow" title="ХОРОШО: Рабочий спред и есть активность"></span>`;
                            } 
                            else {
                                aiDot = `<span class="ai-dot ai-blue" title="ПРОПУСК: Слишком маленький спред или мертвый стакан (0 сделок)"></span>`;
                            }

                            if (row.imbalance && row.imbalance !== "-") {
                                let bidPct = parseInt(row.imbalance);
                                let askPct = 100 - bidPct;
                                imbalanceHtml = `
                                    <div style="width: 100px; height: 10px; background: #ff4444; border-radius: 5px; overflow: hidden; display: flex; margin-bottom: 5px;">
                                        <div style="width: ${bidPct}%; background: #00ffcc; transition: width 0.3s;"></div>
                                    </div>
                                    <div style="font-size: 11px; color: #aaa; text-align: center; width: 100px;">
                                        <span style="color: #00ffcc;">${bidPct}%</span> | <span style="color: #ff4444;">${askPct}%</span>
                                    </div>
                                `;
                            }

                            currentScanCoins.add(row.ticker);
                            if (level > 0) {
                                if (!notifiedCoins[row.ticker] || notifiedCoins[row.ticker] < level) {
                                    notifiedCoins[row.ticker] = level;
                                    if (level > highestAlertLevel) highestAlertLevel = level;
                                }
                            }
                        }

                        htmlBuffer += `
                            <tr class="${trClass}">
                                <td>${aiDot}${row.ticker}</td>
                                <td>${row.spread || "-"}</td>
                                <td>${row.low || "-"}</td>
                                <td>${row.high || "-"}</td>
                                <td>${row.hits || "-"}</td>
                                <td>${row.vol_act || "-"}</td>
                                <td>${row.vol || "-"}</td>
                                <td>${imbalanceHtml}</td>
                            </tr>
                        `;
                    });
                    
                    tableBody.innerHTML = htmlBuffer; 
                    
                    if (highestAlertLevel > 0) playAlertSound(highestAlertLevel);
                    
                    for (let coin in notifiedCoins) {
                        if (!currentScanCoins.has(coin)) delete notifiedCoins[coin];
                    }
                } 
                else if (currentMode === "densities") {
                    title.innerText = `Крупные плотности в стакане (${currentExchange.toUpperCase()})`;
                    tableHead.innerHTML = `<tr><th>Тикер</th><th>Тип</th><th>Цена</th><th>Объем ($)</th><th>Расстояние до цены</th></tr>`;
                    
                    data.forEach(row => {
                        let typeClass = "";
                        let typeText = row.type;
                        
                        if (row.type === "LONG") { typeClass = "type-long"; typeText = "🟢 ПОКУПКА"; } 
                        else if (row.type === "SHORT") { typeClass = "type-short"; typeText = "🔴 ПРОДАЖА"; }

                        let displayVol = row.vol;
                        if (typeof row.vol === 'number') displayVol = `$${row.vol.toLocaleString('ru-RU')}`;

                        htmlBuffer += `
                            <tr>
                                <td>${row.ticker}</td>
                                <td class="${typeClass}">${typeText}</td>
                                <td>${row.price}</td>
                                <td style="font-weight:bold;">${displayVol}</td>
                                <td>${row.dist}</td>
                            </tr>
                        `;
                    });
                    
                    tableBody.innerHTML = htmlBuffer; 
                }
                
                const statusText = document.getElementById('api-status');
                statusText.innerText = "STATUS: [SYSTEM_ONLINE]";
                statusText.style.color = "#00ffcc";
                
            } catch (error) {
                console.error("Ошибка API:", error);
                const statusText = document.getElementById('api-status');
                statusText.innerText = "STATUS: [CONNECTION_ERROR]";
                statusText.style.color = "#ff4444";
            }
        }

        updateData();
        setInterval(updateData, 5000); 
    </script>
</body>
</html>
